          - paragraph [ref=f4e73]: AiKit · Madrid
          - paragraph [ref=f4e74]: AiKit acompaña a empresas en la adopción de inteligencia artificial. El trabajo es de diagnóstico y asesoramiento, no de implantación técnica.
          - paragraph [ref=f4e75]: Dirijo las sesiones de diagnóstico con los equipos del cliente y reviso los informes que salen de ellas, para que cada recomendación se sostenga en lo que se ha visto en la sesión.
          - paragraph [ref=f4e76]: Más de 50 sesiones de diagnóstico y más de 100 informes revisados, con una media de 8 recomendaciones por cliente.
        - article [ref=f4e77]:
