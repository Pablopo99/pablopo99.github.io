      - generic [ref=f4e44]:
        - paragraph [ref=f4e45]: "Trabajo en AiKit, en Madrid, como Strategy Consultant & AI: ayudo a empresas a entender sus operaciones, identificar puntos de dolor y traducir esas necesidades de negocio en recomendaciones prácticas de inteligencia artificial, automatización y herramientas digitales."
        - paragraph [ref=f4e46]: Antes gestioné proyectos internacionales en ESIC University durante dos años y trabajé con una cartera de hoteles en Expedia Group, desde Praga.
        - paragraph [ref=f4e47]: "Lo que me interesa es el tramo que va del análisis a la decisión: entender cómo funciona una organización, medirla y proponer qué cambiar."
        - paragraph [ref=f4e48]: Quiero seguir desarrollándome en consultoría de estrategia, transformación digital, operaciones y gestión de proyectos.
    - region [ref=f4e49]:
