          - paragraph [ref=f4e80]: Expedia Group · Praga
          - paragraph [ref=f4e81]: Expedia Group trabaja con los hoteles que publican su alojamiento en la plataforma; el equipo de partner advisory es su interlocutor para el rendimiento del negocio.
          - paragraph [ref=f4e82]: "Llevé una cartera de hoteles: revisión de su rendimiento en la plataforma y recomendaciones derivadas de ese análisis, en contacto directo con cada alojamiento."
