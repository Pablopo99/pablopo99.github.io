          - paragraph [ref=f4e56]: Diagnóstico de la situación de una empresa y recomendaciones para quien decide. Es lo que hago hoy en AiKit.
        - listitem [ref=f4e57]:
          - heading "Procesos y operaciones" [level=3] [ref=f4e58]
          - paragraph [ref=f4e59]: Cómo se trabaja hoy, dónde se pierde tiempo y qué se puede ordenar. Lo he hecho como analista de operaciones y de experiencia de cliente.
        - listitem [ref=f4e60]:
          - heading "Proyectos y stakeholders" [level=3] [ref=f4e61]
          - paragraph [ref=f4e62]: Coordinación de proyectos con varias partes implicadas y seguimiento hasta el cierre, en entornos internacionales y con instituciones socias.
        - listitem [ref=f4e63]:
          - heading "Datos y negocio" [level=3] [ref=f4e64]
          - paragraph [ref=f4e65]: "Analizar datos para responder preguntas de negocio y seguir indicadores. Herramientas que uso: Excel, Google Analytics y Looker Studio."
