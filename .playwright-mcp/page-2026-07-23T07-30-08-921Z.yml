      - generic [ref=e44]:
        - paragraph [ref=e45]: At AiKit, in Madrid, I work as a Strategy Consultant & AI. I help companies to understand their operations, identify pain points and translate business needs into practical recommendations involving AI, automation and digital tools.
        - paragraph [ref=e46]: Before that, I managed international projects at ESIC University for two years and worked with a portfolio of hotels at Expedia Group, from Prague.
        - paragraph [ref=e47]: "What interests me is the stretch between analysis and decision: understanding how an organization works, measuring it and proposing what to change."
        - paragraph [ref=e48]: I want to keep growing in strategy consulting, digital transformation, operations and project management.
