        - paragraph [ref=e45]: "Trabajo en AiKit, en Madrid, como Strategy Consultant & AI: ayudo a empresas a entender sus operaciones, identificar puntos de dolor y traducir esas necesidades de negocio en recomendaciones prácticas de inteligencia artificial, automatización y herramientas digitales."
