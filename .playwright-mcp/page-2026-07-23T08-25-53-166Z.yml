          - paragraph [ref=f6e73]: AiKit · Madrid
          - paragraph [ref=f6e74]: AiKit acompaña a empresas en la adopción de inteligencia artificial. El trabajo es de diagnóstico y asesoramiento, no de implantación técnica.
          - paragraph [ref=f6e75]: Dirijo las sesiones de diagnóstico con los equipos del cliente y reviso los informes que salen de ellas, para que cada recomendación se sostenga en lo que se ha visto en la sesión.
          - paragraph [ref=f6e76]: Más de 50 sesiones de diagnóstico y más de 100 informes revisados, con una media de 8 recomendaciones por cliente.
        - article [ref=f6e77]:
          - paragraph [ref=f6e78]: mar. 2025 – ago. 2025
          - heading "Partner Success Associate — Business Performance & Partner Advisory" [level=3] [ref=f6e79]
          - paragraph [ref=f6e80]: Expedia Group · Praga
          - paragraph [ref=f6e81]: Expedia Group trabaja con los hoteles que publican su alojamiento en la plataforma; el equipo de partner advisory es su interlocutor para el rendimiento del negocio.
          - paragraph [ref=f6e82]: "Llevé una cartera de hoteles: revisión de su rendimiento en la plataforma y recomendaciones derivadas de ese análisis, en contacto directo con cada alojamiento."
          - paragraph [ref=f6e83]: Cartera de más de 180 hoteles.
