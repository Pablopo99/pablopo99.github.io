          - paragraph [ref=f6e56]: Diagnóstico de la situación de una empresa y recomendaciones para quien decide. Es lo que hago hoy en AiKit.
        - listitem [ref=f6e57]:
          - heading "Procesos y operaciones" [level=3] [ref=f6e58]
          - paragraph [ref=f6e59]: Cómo se trabaja hoy, dónde se pierde tiempo y qué se puede ordenar. Lo he hecho como analista de operaciones y de experiencia de cliente.
        - listitem [ref=f6e60]:
          - heading "Proyectos y stakeholders" [level=3] [ref=f6e61]
          - paragraph [ref=f6e62]: Coordinación de proyectos con varias partes implicadas y seguimiento hasta el cierre, en entornos internacionales y con instituciones socias.
        - listitem [ref=f6e63]:
          - heading "Datos y negocio" [level=3] [ref=f6e64]
          - paragraph [ref=f6e65]: "Analizar datos para responder preguntas de negocio y seguir indicadores. Herramientas que uso: Excel, Google Analytics y Looker Studio."
