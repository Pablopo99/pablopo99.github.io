          - paragraph [ref=f6e87]: ESIC University · Madrid
          - paragraph [ref=f6e88]: El área internacional de ESIC University coordina la movilidad de estudiantes y de personal con instituciones socias de cinco continentes.
          - paragraph [ref=f6e89]: "Gestioné los proyectos de movilidad de principio a fin: convocatorias, coordinación con las instituciones socias, seguimiento de las ayudas y resolución de los problemas de cada caso."
          - paragraph [ref=f6e90]: Más de 700 estudiantes al año, más de 80 movilidades de personal y 130.000 € en ayudas gestionadas.
